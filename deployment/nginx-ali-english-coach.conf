# /etc/nginx/sites-available/ali-english-coach
# AYRI server block. Mevcut kiradefteripro config'lerine dokunma.
# Etkinleştir:  sudo ln -s /etc/nginx/sites-available/ali-english-coach /etc/nginx/sites-enabled/
# Test/Reload:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name english.example.com;

    # Certbot HTTP-01 doğrulaması ve HTTPS yönlendirmesi.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name english.example.com;

    # SSL sertifikaları certbot tarafından doldurulur (aşağıdaki SSL adımına bak).
    ssl_certificate     /etc/letsencrypt/live/english.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/english.example.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
